name: Documentation or schema correction
description: Report an unclear benchmark-card statement, schema field, citation, or release-boundary note.
title: "[docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link or name the file, section, schema, field, or artifact manifest entry.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should be corrected?
      description: Describe the ambiguity, stale path, schema mismatch, or provenance issue.
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested wording or evidence
      description: Optional replacement text, citation, or command that supports the correction.
    validations:
      required: false
