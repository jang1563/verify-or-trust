name: Reproducibility bug
description: Report a command, substrate row, artifact, or validation path that does not work as documented.
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping keep the benchmark reproducible. Please include enough detail for the failing command or artifact to be checked directly.
  - type: textarea
    id: command
    attributes:
      label: Command or artifact
      description: Paste the command, substrate path, panel file, or artifact identifier that failed.
      placeholder: make reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did the documentation, schema, or manifest say should happen?
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What actually happened? Include the relevant error text.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, install mode, and whether the issue is local, GitHub, or Hugging Face.
    validations:
      required: false
