name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest
      - name: Reproduce (panels + K1 value proof from the shipped substrate)
        run: |
          vot panels --substrate-table data/substrates/gears_norman.csv --out runs/panels.jsonl --seed 13
          vot baselines --panels runs/panels.jsonl
      - name: Validate public release surface
        run: python3 scripts/validate_public_release.py
